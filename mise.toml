[tasks.build]
description = "Build the project"
run = "cabal build --ghc-options=-Werror"

[tasks.test]
description = "Run test suite"
depends = ["build"]
run = "cabal test --ghc-options=-Werror"

[tasks.lint]
description = "Run HLint on source files"
run = "hlint src/ app/ test/haskell/"

[tasks.format]
description = "Format source files with fourmolu"
run = "fourmolu --mode inplace src/ app/ test/haskell/"

[tasks.fix]
description = "Format, lint, build, and test before PR"
run = """
fourmolu --mode inplace src/ app/ test/haskell/
hlint src/ app/ test/haskell/
cabal build --ghc-options=-Werror
cabal test --ghc-options=-Werror
"""
