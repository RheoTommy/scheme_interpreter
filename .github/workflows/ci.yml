name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        id: setup
        with:
          ghc-version: "9.14.1"

      - name: Restore cabal cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.setup.outputs.cabal-store }}
          key: cabal-${{ runner.os }}-${{ steps.setup.outputs.ghc-version }}-${{ hashFiles('**/*.cabal') }}
          restore-keys: |
            cabal-${{ runner.os }}-${{ steps.setup.outputs.ghc-version }}-

      - name: Install dependencies
        run: cabal build --only-dependencies

      - name: Build
        run: cabal build

      - name: Test
        run: cabal test

  hlint:
    name: HLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/hlint-setup@v2
        with:
          version: "3.10"

      - uses: haskell-actions/hlint-run@v2
        with:
          path: '["src/", "app/", "test/haskell/"]'
          fail-on: warning

  fourmolu:
    name: Fourmolu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/run-fourmolu@v11
        with:
          version: "0.19.0.1"
          pattern: |
            src/**/*.hs
            app/**/*.hs
            test/haskell/**/*.hs
